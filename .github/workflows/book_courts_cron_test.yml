name: book_courts_cron_test

on:
  workflow_dispatch: {}

jobs:
  badminton_cron_test:
    runs-on: ubuntu-latest
    env:
      EMAIL_PADDY: ${{ secrets.LIFESTYLES_EMAIL }}
      PASSWORD_PADDY: ${{ secrets.LIFESTYLES_PASSWORD }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set_up_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install_dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv

      - name: book_court
        run: |
          python -m lifestyles_browser.cli --badminton-club-booking \
            --profile paddy \
            --location 144 \
            --days-ahead 2 \
            --window-start 09:00 \
            --window-end 12:00 \
            --dry-run True
