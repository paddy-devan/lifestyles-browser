name: book_courts_wednesday

on:
  workflow_dispatch: {}
  schedule:
    - cron: "45 5 * * WED"

jobs:
  badminton_wednesday:
    runs-on: ubuntu-latest
    env:
      EMAIL_PADDY: ${{ secrets.LIFESTYLES_EMAIL }}
      PASSWORD_PADDY: ${{ secrets.LIFESTYLES_PASSWORD }}
      EMAIL_HANNAH: ${{ secrets.LIFESTYLES_EMAIL_HANNAH }}
      PASSWORD_HANNAH: ${{ secrets.LIFESTYLES_PASSWORD_HANNAH }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set_up_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install_dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv

      - name: book_court
        run: |
          python -m lifestyles_browser.cli --badminton-club-booking \
            --profile paddy \
            --profile hannah \
            --location 144 \
            --location 3 \
            --days-ahead 7 \
            --window-start 19:00 \
            --window-end 21:00
